{% extends 'base.html' %}

{% block title %}Add a Business — local-business-directory{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="h3 mb-1">Add a Business</h1>
    <p class="text-muted mb-4">Fields marked <span class="text-danger">*</span> are required.</p>

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('add') }}" novalidate>

          <div class="mb-3">
            <label for="name" class="form-label fw-semibold">
              Business Name <span class="text-danger">*</span>
            </label>
            <input
              type="text" id="name" name="name" class="form-control"
              value="{{ form.get('name', '') }}" required maxlength="120"
              placeholder="e.g. Corner Bakery"
            />
          </div>

          <div class="mb-3">
            <label for="category" class="form-label fw-semibold">
              Category <span class="text-danger">*</span>
            </label>
            <select id="category" name="category" class="form-select" required>
              <option value="" disabled {% if not form.get('category') %}selected{% endif %}>Select a category…</option>
              {% for cat in categories %}
                <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="city" class="form-label fw-semibold">
              City <span class="text-danger">*</span>
            </label>
            <input
              type="text" id="city" name="city" class="form-control"
              value="{{ form.get('city', '') }}" required maxlength="100"
              placeholder="e.g. Springfield"
            />
          </div>

          <div class="mb-3">
            <label for="address" class="form-label fw-semibold">Street Address</label>
            <input
              type="text" id="address" name="address" class="form-control"
              value="{{ form.get('address', '') }}" maxlength="200"
              placeholder="e.g. 123 Main St"
            />
          </div>

          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label for="phone" class="form-label fw-semibold">Phone</label>
              <input
                type="tel" id="phone" name="phone" class="form-control"
                value="{{ form.get('phone', '') }}" maxlength="30"
                placeholder="e.g. (555) 123-4567"
              />
            </div>
            <div class="col-sm-6">
              <label for="email" class="form-label fw-semibold">Email</label>
              <input
                type="email" id="email" name="email" class="form-control"
                value="{{ form.get('email', '') }}" maxlength="120"
                placeholder="e.g. hello@example.com"
              />
            </div>
          </div>

          <div class="mb-3">
            <label for="website" class="form-label fw-semibold">Website</label>
            <input
              type="url" id="website" name="website" class="form-control"
              value="{{ form.get('website', '') }}" maxlength="200"
              placeholder="https://example.com"
            />
          </div>

          <div class="mb-4">
            <label for="description" class="form-label fw-semibold">Description</label>
            <textarea
              id="description" name="description" class="form-control"
              rows="3" maxlength="500"
              placeholder="Brief description of the business…"
            >{{ form.get('description', '') }}</textarea>
            <div class="form-text">Max 500 characters.</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check2-circle me-1"></i>Add Business
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
